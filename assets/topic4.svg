<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Geodesic / Low-poly Sphere -->
  <circle cx="50" cy="50" r="35" stroke-width="2" />
  
  <!-- Internal triangle web (low-poly mesh) -->
  <path d="M 50 15 L 35 35 L 65 35 Z" />
  <path d="M 35 35 L 20 50 L 30 65 L 50 85 L 70 65 L 80 50 L 65 35" />
  <path d="M 35 35 L 30 65 M 65 35 L 70 65" />
  <path d="M 50 15 L 20 50 M 50 15 L 80 50" />
  <path d="M 30 65 L 50 55 L 70 65" />
  <path d="M 50 55 L 50 15 M 50 55 L 50 85" />
  <path d="M 35 35 L 50 55 M 65 35 L 50 55" />
  
  <!-- Outer nodes -->
  <circle cx="50" cy="15" r="2.5" fill="currentColor" />
  <circle cx="35" cy="35" r="2.5" fill="currentColor" />
  <circle cx="65" cy="35" r="2.5" fill="currentColor" />
  <circle cx="20" cy="50" r="2.5" fill="currentColor" />
  <circle cx="80" cy="50" r="2.5" fill="currentColor" />
  <circle cx="30" cy="65" r="2.5" fill="currentColor" />
  <circle cx="70" cy="65" r="2.5" fill="currentColor" />
  <circle cx="50" cy="85" r="2.5" fill="currentColor" />
</svg>

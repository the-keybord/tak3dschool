<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Small connection line -->
  <line x1="35" y1="55" x2="65" y2="40" stroke-dasharray="3 3" opacity="0.5" />
  
  <!-- Large Gear (Center at 35, 55) -->
  <circle cx="35" cy="55" r="16" stroke-width="2" />
  <circle cx="35" cy="55" r="5" />
  <!-- Gear Teeth -->
  <path d="M 35 34 L 35 39 M 35 71 L 35 76 M 14 55 L 19 55 M 51 55 L 56 55 
           M 20 40 L 24 44 M 46 66 L 50 70 M 20 70 L 24 66 M 46 40 L 50 44" stroke-width="2.5" />
  
  <!-- Small Gear (Center at 65, 40) -->
  <circle cx="65" cy="40" r="10" stroke-width="2" />
  <circle cx="65" cy="40" r="3" />
  <!-- Gear Teeth -->
  <path d="M 65 26 L 65 30 M 65 50 L 65 54 M 51 40 L 55 40 M 75 40 L 79 40
           M 55 30 L 58 33 M 72 47 L 75 50 M 55 50 L 58 47 M 72 30 L 75 33" stroke-width="2" />
           
  <!-- Mechanical Linkage/Arm -->
  <path d="M 35 55 L 50 75 L 80 75" stroke-width="2" stroke-linecap="round" />
  <circle cx="50" cy="75" r="2" fill="currentColor" />
  <circle cx="80" cy="75" r="2" fill="currentColor" />
</svg>
